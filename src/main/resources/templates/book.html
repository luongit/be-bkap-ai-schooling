<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>{{title}}</title>

<style>
/* =====================
   PAGE SETUP
===================== */
@page {
  size: A4;
  margin: 0;
}

body {
  margin: 0;
  font-family: "Georgia", "Times New Roman", serif;
  background: #fff;
}

/* =====================
   BOOK SPREAD
===================== */
.spread {
  width: 210mm;
  height: 297mm;
  display: flex;
  page-break-after: always;
}

/* =====================
   LEFT PAGE – IMAGE
===================== */
.page-image {
  width: 50%;
  background: #f4f4f4;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18mm;
  box-sizing: border-box;
}

.page-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 6px;
}

/* =====================
   RIGHT PAGE – TEXT
===================== */
.page-text {
  width: 50%;
  padding: 22mm 20mm;
  box-sizing: border-box;
  background: #ffffff;
  color: #111;
  font-size: 15pt;
  line-height: 1.65;
  text-align: justify;
}

/* Dropcap */
.page-text p::first-letter {
  float: left;
  font-size: 300%;
  line-height: 1;
  padding-right: 8px;
  padding-top: 4px;
  font-weight: bold;
}

/* =====================
   TITLE PAGE
===================== */
.cover {
  width: 210mm;
  height: 297mm;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  page-break-after: always;
}

.cover h1 {
  font-size: 32pt;
  margin-bottom: 12px;
  text-align: center;
}

.cover p {
  font-size: 16pt;
  color: #555;
  text-align: center;
  max-width: 70%;
}
</style>
</head>

<body>

<!-- =====================
     COVER PAGE
===================== -->
<div class="cover">
  <h1>{{title}}</h1>
  <p>{{description}}</p>
</div>

<!-- =====================
     STORY PAGES
===================== -->

<!-- LẶP KHỐI NÀY CHO MỖI PAGE -->
<div class="spread">
  <div class="page-image">
    <img src="{{imageUrl}}" />
  </div>

  <div class="page-text">
    <p>{{textContent}}</p>
  </div>
</div>
<!-- END PAGE -->

</body>
</html>
